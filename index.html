<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">WT</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link active" href="index.html">Calculator</a></li>
<li class="nav-item"><a class="nav-link" href="resultcard.html">Result Card</a></li>
</ul>
</div>
</div>
</nav>
<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-5">
    <h2 class="text-center mb-4">Simple Calculator</h2>
    <form onsubmit="calculate(); return false;">
        <input type="number" id="num1" class="form-control mb-3"
               placeholder="First Number" required>
        <select id="operator" class="form-control mb-3">
            <option value="add">Addition (+)</option>
            <option value="subtract">Subtraction (-)</option>
            <option value="multiply">Multiplication (*)</option>
            <option value="divide">Division (/)</option>
        </select>
        <input type="number" id="num2" class="form-control mb-3"
               placeholder="Second Number" required>
        <button type="submit" class="btn btn-dark w-100">Calculate</button>
    </form>
    <h3 class="text-center mt-4" id="resultText"></h3>
</div>
</div>
</div>
<footer class="text-center p-3 bg-dark text-white mt-5">
    © Web Technology
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function calculate() {
    const num1 = parseFloat(document.getElementById('num1').value);
    const num2 = parseFloat(document.getElementById('num2').value);
    const operator = document.getElementById('operator').value;
    let result;
    switch (operator) {
        case 'add':
            result = num1 + num2;
            break;
        case 'subtract':
            result = num1 - num2;
            break;
        case 'multiply':
            result = num1 * num2;
            break;
        case 'divide':
            if (num2 === 0) {
                result = "Error: Division by zero";
            } else {
                result = num1 / num2;
            }
            break;
        default:
            result = "Invalid Operator";
    }
    document.getElementById('resultText').textContent = "Result: " + result;
}
</script>
</body>
</html>
