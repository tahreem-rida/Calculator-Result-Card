<!DOCTYPE html>
<html>
<head>
    <title>Result Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">WT</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Calculator</a></li>
<li class="nav-item"><a class="nav-link active" href="resultcard.html">Result Card</a></li>
</ul>
</div>
</div>
</nav>
<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-5">
    <h2 class="text-center mb-4">Result Card</h2>
    <form onsubmit="calculateResult(); return false;">
        <input type="number" id="english" class="form-control mb-3"
               placeholder="English Marks" required>
        <input type="number" id="urdu" class="form-control mb-3"
               placeholder="Urdu Marks" required>
        <input type="number" id="math" class="form-control mb-3"
               placeholder="Math Marks" required>
        <input type="number" id="science" class="form-control mb-3"
               placeholder="Science Marks" required>
        <input type="number" id="computer" class="form-control mb-3"
               placeholder="Computer Marks" required>
        <button type="submit" class="btn btn-dark w-100">Calculate Result</button>
    </form>
    <div id="resultOutput" class="mt-4"></div>
</div>
</div>
</div>
<footer class="text-center p-3 bg-dark text-white mt-5">
    © Web Technology
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function calculateResult() {
    const english = parseFloat(document.getElementById('english').value);
    const urdu = parseFloat(document.getElementById('urdu').value);
    const math = parseFloat(document.getElementById('math').value);
    const science = parseFloat(document.getElementById('science').value);
    const computer = parseFloat(document.getElementById('computer').value);
    const totalMarks = 500;
    const obtainedMarks = english + urdu + math + science + computer;
    const percentage = (obtainedMarks / totalMarks) * 100;
    let grade;
    if (percentage >= 80) {
        grade = "A";
    } else if (percentage >= 70) {
        grade = "B";
    } else if (percentage >= 60) {
        grade = "C";
    } else if (percentage >= 50) {
        grade = "D";
    } else {
        grade = "Fail";
    }
    document.getElementById('resultOutput').innerHTML = `
        <h4>English: ${english}</h4>
        <h4>Urdu: ${urdu}</h4>
        <h4>Math: ${math}</h4>
        <h4>Science: ${science}</h4>
        <h4>Computer: ${computer}</h4>
        <hr>
        <h4>Total Marks: ${totalMarks}</h4>
        <h4>Obtained Marks: ${obtainedMarks}</h4>
        <h4>Percentage: ${percentage.toFixed(2)}%</h4>
        <h4>Grade: ${grade}</h4>
    `;
}
</script>
</body>
</html>
